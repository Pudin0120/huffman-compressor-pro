# Nginx Configuration - Huffman Compressor Pro
# Usa este archivo para servir la aplicación en producción

upstream huffman_backend {
    server localhost:8000;
}

upstream huffman_frontend {
    server localhost:3000;
}

# Redirigir HTTP a HTTPS
server {
    listen 80;
    server_name huffman.example.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name huffman.example.com;

    # SSL Certificates (usar Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/huffman.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/huffman.example.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;
    gzip_min_length 1000;

    # API Backend
    location /api/ {
        proxy_pass http://huffman_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Timeout para archivos grandes
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend
    location / {
        proxy_pass http://huffman_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets estáticos
    location /_next/static/ {
        proxy_cache_valid 30d;
        proxy_pass http://huffman_frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/huffman_access.log;
    error_log /var/log/nginx/huffman_error.log;
}
